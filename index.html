<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@600&family=Pinyon+Script&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0" />
</head>
<body>

    <div class="main-card">
        <div class="bismillah">بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ</div>
        
        <p class="label-text">You are invited to the wedding of</p>
        
        <div class="names">Rushaid & Famnu</div>
        
        <p class="label-text" style="font-size: 9px;">Request the honor of your presence</p>

        <div class="date-container">
            <div class="date-side">APRIL<br>2026,<br>SATURDAY</div>
            <div class="date-center">25</div>
            <div class="date-side">11:00 AM<br>TO 03:00<br>PM</div>
        </div>

        <div class="label-text" style="color: #444; font-weight: 600;">26 SHAWWAL 1447</div>

        <div class="location-section">
            <span class="material-symbols-outlined location-logo">location_on</span>
            <span class="venue-name">Snehatheeram Centre</span>
            <span class="venue-address">Ambalakkandi, Omassery</span>
        </div>

        <p class="label-text" style="margin-top: 40px;">Countdown to Reception</p>

        <div class="timer-container">
            <div class="timer-box">
                <span class="num" id="days">00</span>
                <span class="unit">Days</span>
            </div>
            <div class="timer-box">
                <span class="num" id="hours">00</span>
                <span class="unit">Hours</span>
            </div>
            <div class="timer-box">
                <span class="num" id="mins">00</span>
                <span class="unit">Mins</span>
            </div>
            <div class="timer-box">
                <span class="num" id="secs">00</span>
                <span class="unit">Secs</span>
            </div>
        </div>
    </div>

</body>
</html>
