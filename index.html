<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:wght@700&family=Pinyon+Script&display=swap" rel="stylesheet">
    
    <style>
        /* This CSS must be inside these style tags */
        body {
            background-color: #f0f0f0; 
            margin: 0;
            padding: 20px 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            font-family: 'Montserrat', sans-serif;
            min-height: 100vh;
        }

        .main-card {
            background: white;
            width: 88%;
            max-width: 400px;
            border-radius: 30px;
            padding: 40px 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            box-sizing: border-box;
        }

        .bismillah { font-size: 20px; margin-bottom: 20px; }
        
        .script-name {
            font-family: 'Pinyon Script', cursive;
            font-size: 45px;
            margin: 15px 0;
            color: #222;
        }

        .label {
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.6;
            margin: 10px 0;
        }

        /* THE BOXY DATE SECTION */
        .date-box {
            display: flex;
            border: 1px solid #ddd;
            border-radius: 15px;
            margin: 25px 0;
            overflow: hidden;
            background: #fff;
        }

        .date-left, .date-right {
            flex: 1;
            padding: 10px;
            font-size: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1.4;
        }

        .date-number {
            flex: 0.7;
            font-size: 40px;
            font-family: 'Playfair Display', serif;
            color: #5b7a5d;
            border-left: 1px solid #ddd;
            border-right: 1px solid #ddd;
            padding: 10px 0;
            background: #fafafa;
        }

        /* THE BOXY TIMER */
        .timer-row {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .t-box {
            background: #fff;
            padding: 15px 5px;
            border-radius: 12px;
            flex: 1;
            border: 1px solid #eee;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        .t-box b { font-size: 20px; display: block; }
        .t-box span { font-size: 8px; text-transform: uppercase; opacity: 0.5; }

        .venue { margin-top: 30px; font-size: 12px; line-height: 1.6; }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="bismillah">بسم الله الرحمن الرحيم</div>
        <div class="label">You are invited to the wedding of</div>
        
        <div class="script-name">Rushaid & Famnu</div>
        
        <div class="label">Request the honor of your presence</div>

        <div class="date-box">
            <div class="date-left">APRIL<br>2026,<br>SATURDAY</div>
            <div class="date-number">25</div>
            <div class="date-right">11:00 AM<br>TO 03:00<br>PM</div>
        </div>

        <div class="label" style="font-size: 11px;">26 SHAWWAL 1447</div>

        <div class="venue">
            <strong>📍 SNEHATHEERAM CENTRE</strong><br>
            <span style="opacity: 0.7;">AMBALAKKANDI, OMASSERY</span>
        </div>

        <div class="label" style="margin-top: 40px;">Countdown to Reception</div>

        <div class="timer-row">
            <div class="t-box"><b>08</b><span>Days</span></div>
            <div class="t-box"><b>20</b><span>Hours</span></div>
            <div class="t-box"><b>14</b><span>Mins</span></div>
            <div class="t-box"><b>29</b><span>Secs</span></div>
        </div>
    </div>

</body>
</html>
