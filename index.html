<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@1,600&family=Pinyon+Script&display=swap" rel="stylesheet">
    
    <style>
        /* 1. LAYOUT & SPACING */
        body {
            background-color: #f4f4f4; /* Subtle grey background */
            margin: 0;
            padding: 40px 0; /* Space at top and bottom of screen */
            display: flex;
            justify-content: center;
            font-family: 'Montserrat', sans-serif;
            color: #4a4a4a;
        }

        .main-card {
            background-color: white;
            width: 90%;          /* Creates the left/right "Gutter" space */
            max-width: 400px;    /* Keeps it perfectly shaped on mobile/web */
            border-radius: 35px; /* Smooth rounded corners from screenshot */
            padding: 50px 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.06);
            text-align: center;
        }

        /* 2. TYPOGRAPHY */
        .bismillah {
            font-size: 24px;
            margin-bottom: 25px;
            opacity: 0.8;
        }

        .sub-header {
            font-size: 10px;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            margin-bottom: 15px;
            opacity: 0.6;
        }

        .names {
            font-family: 'Pinyon Script', cursive;
            font-size: 48px;
            margin: 10px 0 30px 0;
            color: #333;
        }

        /* 3. BOXY DATE TEMPLATE */
        .date-container {
            display: flex;
            justify-content: center;
            align-items: center;
            border: 1px solid #e0e0e0;
            border-radius: 15px;
            margin: 30px auto;
            overflow: hidden;
            width: 100%;
        }

        .date-side {
            flex: 1;
            padding: 15px 5px;
            font-size: 10px;
            letter-spacing: 1.2px;
            line-height: 1.6;
            text-transform: uppercase;
        }

        .date-center {
            flex: 0.8;
            font-size: 45px;
            font-family: 'Playfair Display', serif;
            color: #5b7a5d; /* Dark Sage Green from screenshot */
            border-left: 1px solid #e0e0e0;
            border-right: 1px solid #e0e0e0;
            padding: 10px 0;
            background: #fdfdfd;
        }

        /* 4. BOXY TIMER */
        .timer-container {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }

        .timer-box {
            background: white;
            padding: 15px 5px;
            border-radius: 15px;
            flex: 1;
            box-shadow: 0 8px 20px rgba(0,0,0,0.04), inset 0 0 0 1px #eee;
        }

        .timer-box .num {
            font-size: 22px;
            font-weight: 600;
            display: block;
        }

        .timer-box .label {
            font-size: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.5;
            margin-top: 5px;
        }

        .venue-info {
            margin-top: 40px;
            font-size: 12px;
            letter-spacing: 1px;
        }

        .venue-name {
            font-weight: 600;
            text-transform: uppercase;
            display: block;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <div class="main-card">
        <div class="bismillah">بسم الله الرحمن الرحيم</div>
        
        <div class="sub-header">You are invited to the wedding of</div>
        
        <div class="names">Rushaid & Famnu</div>
        
        <div class="sub-header">Request the honor of your presence</div>

        <div class="date-container">
            <div class="date-side">
                APRIL<br>2026,<br>SATURDAY
            </div>
            <div class="date-center">25</div>
            <div class="date-side">
                11:00 AM<br>TO 03:00<br>PM
            </div>
        </div>

        <div class="sub-header" style="font-size: 11px;">26 SHAWWAL 1447</div>

        <div class="venue-info">
            <span class="venue-name">📍 SNEHATHEERAM CENTRE</span>
            <span style="opacity: 0.6;">AMBALAKKANDI, OMASSERY</span>
        </div>

        <div class="sub-header" style="margin-top: 50px;">Countdown to Reception</div>

        <div class="timer-container">
            <div class="timer-box">
                <span class="num">08</span>
                <span class="label">Days</span>
            </div>
            <div class="timer-box">
                <span class="num">20</span>
                <span class="label">Hours</span>
            </div>
            <div class="timer-box">
                <span class="num">19</span>
                <span class="label">Mins</span>
            </div>
            <div class="timer-box">
                <span class="num">26</span>
                <span class="label">Secs</span>
            </div>
        </div>
    </div>

</body>
</html>
