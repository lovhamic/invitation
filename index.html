<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:wght@700&family=Pinyon+Script&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Prevent scroll during loading */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Montserrat', sans-serif;
        }

        /* 1. LOADING SCREEN */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .loader-icon {
            width: 50px;
            height: 50px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #5b7a5d;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* 2. BACKGROUND */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-image {
            width: 100%;
            height: 100%;
            background-image: url('a.jpg'); 
            background-size: cover;
            background-position: center;
            filter: brightness(55%) sepia(20%);
            animation: kenburns 25s infinite alternate ease-in-out;
        }

        @keyframes kenburns {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }

        /* 3. THE MAIN CARD WITH ENTRANCE ANIMATION */
        .main-card {
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(10px);
            width: 88%;
            max-width: 380px;
            border-radius: 35px;
            padding: 45px 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.4);
            
            /* Hidden initially for animation */
            opacity: 0;
            transform: translateY(30px);
            transition: all 1.2s cubic-bezier(0.22, 1, 0.36, 1);
        }

        /* Class triggered by JS when loading ends */
        .main-card.show {
            opacity: 1;
            transform: translateY(0);
            overflow-y: auto;
        }

        .bismillah { font-size: 22px; margin-bottom: 15px; color: #222; }
        .label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.6; margin: 15px 0; }
        .names { font-family: 'Pinyon Script', cursive; font-size: 46px; margin: 10px 0 25px 0; color: #111; }

        /* 4. DATE & VENUE */
        .date-box {
            display: flex;
            border: 1px solid #e0e0e0;
            border-radius: 15px;
            margin: 25px 0;
            background: #fff;
            overflow: hidden;
        }
        .date-side { flex: 1; padding: 12px 5px; font-size: 9px; display: flex; align-items: center; justify-content: center; line-height: 1.5; text-transform: uppercase; }
        .date-number { flex: 0.7; font-size: 42px; font-family: 'Playfair Display', serif; color: #5b7a5d; border-left: 1px solid #e0e0e0; border-right: 1px solid #e0e0e0; padding: 8px 0; background: #fafafa; }

        .venue-link { text-decoration: none; color: inherit; display: block; margin-top: 30px; }
        .location-pin { animation: pinBounce 2s infinite ease-in-out; }
        @keyframes pinBounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-6px); } }
        .venue-details { font-size: 11px; line-height: 1.6; }
        .venue-details strong { color: #5b7a5d; letter-spacing: 1px; font-size: 13px; }

        /* 5. TIMER */
        .timer-row { display: flex; gap: 10px; margin-top: 20px; }
        .t-box { background: white; padding: 15px 0; border-radius: 15px; flex: 1; border: 1px solid #f0f0f0; box-shadow: 0 5px 15px rgba(0,0,0,0.04); }
        .t-box b { font-size: 20px; display: block; color: #333; }
        .t-box span { font-size: 8px; text-transform: uppercase; opacity: 0.5; letter-spacing: 1px; }

    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-icon"></div>
        <div class="label" style="opacity: 0.4;">Loading Invitation...</div>
    </div>

    <div class="bg-container">
        <div class="bg-image"></div>
    </div>

    <div class="main-card" id="invitationCard">
        <div class="bismillah">بسم الله الرحمن الرحيم</div>
        <div class="label">Wedding Invitation</div>
        <div class="names">Rushaid & Famnu</div>
        <div class="label">Request the honor of your presence</div>

        <div class="date-box">
            <div class="date-side">APRIL<br>2026,<br>SATURDAY</div>
            <div class="date-number">25</div>
            <div class="date-side">11:00 AM<br>TO 03:00<br>PM</div>
        </div>

        <div class="label" style="font-size: 11px;">26 SHAWWAL 1447</div>

        <a href="https://maps.google.com/?q=Snehatheeram+Convention+Centre+Omassery" target="_blank" class="venue-link">
            <div class="venue">
                <div class="location-pin">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#5b7a5d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
                        <circle cx="12" cy="10" r="3"></circle>
                    </svg>
                </div>
                <div class="venue-details">
                    <strong>SNEHATHEERAM CENTRE</strong><br>
                    <span style="opacity: 0.7;">AMBALAKKANDI, OMASSERY</span>
                </div>
            </div>
        </a>

        <div class="label" style="margin-top: 45px;">Countdown to Reception</div>

        <div class="timer-row">
            <div class="t-box"><b id="days">00</b><span>Days</span></div>
            <div class="t-box"><b id="hours">00</b><span>Hours</span></div>
            <div class="t-box"><b id="mins">00</b><span>Mins</span></div>
            <div class="t-box"><b id="secs">00</b><span>Secs</span></div>
        </div>
    </div>

    <script>
        // 1. LOADING LOGIC
        window.addEventListener('load', function() {
            const loader = document.getElementById('loader');
            const card = document.getElementById('invitationCard');
            
            // Artificial delay (1.5 seconds) to show off the loading screen
            setTimeout(() => {
                loader.style.opacity = '0';
                loader.style.visibility = 'hidden';
                
                // Trigger the 'In' animation for the card
                card.classList.add('show');
                document.body.style.overflow = 'auto';
            }, 1500);
        });

        // 2. COUNTDOWN TIMER
        const weddingDate = new Date("April 25, 2026 11:00:00").getTime();
        setInterval(function() {
            const now = new Date().getTime();
            const distance = weddingDate - now;
            document.getElementById("days").innerHTML = Math.floor(distance / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
            document.getElementById("hours").innerHTML = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
            document.getElementById("mins").innerHTML = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
            document.getElementById("secs").innerHTML = Math.floor((distance % (1000 * 60)) / 1000).toString().padStart(2, '0');
        }, 1000);
    </script>

</body>
</html>
