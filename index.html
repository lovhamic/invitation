<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&family=Playfair+Display:wght@700&family=Pinyon+Script&display=swap" rel="stylesheet">
    
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow-x: hidden;
        }

        /* 1. ANIMATED BACKGROUND IMAGE */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: #222; /* Fallback */
            overflow: hidden;
        }

        .bg-image {
            width: 100%;
            height: 100%;
            background-image: url('a.jpg');
            background-size: cover;
            background-position: center;
            filter: brightness(60%) sepia(20%);
            /* Slow Zoom Animation */
            animation: kenburns 20s infinite alternate;
        }

        @keyframes kenburns {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        /* 2. THE CARD LAYOUT */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Montserrat', sans-serif;
        }

        .main-card {
            background: rgba(255, 255, 255, 0.92); /* Slightly transparent */
            backdrop-filter: blur(8px); /* Frosted glass effect */
            width: 88%;
            max-width: 380px;
            border-radius: 30px;
            padding: 40px 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            text-align: center;
            box-sizing: border-box;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Components from previous steps */
        .bismillah { font-size: 20px; margin-bottom: 15px; color: #333; }
        .label { font-size: 9px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.7; margin: 12px 0; }
        .names { font-family: 'Pinyon Script', cursive; font-size: 42px; margin: 10px 0 20px 0; color: #111; }

        .date-box {
            display: flex;
            border: 1px solid #ddd;
            border-radius: 12px;
            margin: 20px 0;
            background: rgba(255,255,255,0.5);
        }

        .date-side { flex: 1; padding: 10px; font-size: 9px; display: flex; align-items: center; justify-content: center; line-height: 1.4; text-transform: uppercase; }
        .date-number { flex: 0.7; font-size: 38px; font-family: 'Playfair Display', serif; color: #5b7a5d; border-left: 1px solid #ddd; border-right: 1px solid #ddd; padding: 5px 0; }

        .timer-row { display: flex; gap: 8px; margin-top: 15px; }
        .t-box { background: white; padding: 12px 5px; border-radius: 10px; flex: 1; border: 1px solid #eee; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .t-box b { font-size: 18px; display: block; }
        .t-box span { font-size: 7px; text-transform: uppercase; opacity: 0.5; }

        .venue { margin-top: 25px; font-size: 11px; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="bg-container">
        <div class="bg-image"></div>
    </div>

    <div class="main-card">
        <div class="bismillah">بسم الله الرحمن الرحيم</div>
        <div class="label">Wedding Invitation</div>
        <div class="names">Rushaid & Famnu</div>
        <div class="label">Save the Date</div>

        <div class="date-box">
            <div class="date-side">APRIL<br>2026,<br>SATURDAY</div>
            <div class="date-number">25</div>
            <div class="date-side">11:00 AM<br>TO 03:00<br>PM</div>
        </div>

        <div class="venue">
            <strong>📍 SNEHATHEERAM CENTRE</strong><br>
            <span style="opacity: 0.7;">AMBALAKKANDI, OMASSERY</span>
        </div>

        <div class="label" style="margin-top: 35px;">Countdown</div>

        <div class="timer-row">
            <div class="t-box"><b>08</b><span>Days</span></div>
            <div class="t-box"><b>20</b><span>Hours</span></div>
            <div class="t-box"><b>14</b><span>Mins</span></div>
            <div class="t-box"><b>29</b><span>Secs</span></div>
        </div>
    </div>

</body>
</html>
